<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blog</title>

    <style>
        body {
            max-width: 850px;
            margin: 0 auto;
            padding: 2rem;
            font-family: Georgia, serif;
            line-height: 1.7;
            font-size: 18px;
            color: #222;
        }

        h1 {
            margin-bottom: 0.25rem;
        }

        .subtitle {
            color: #666;
            margin-bottom: 2rem;
        }

        .post-list {
            list-style: none;
            padding: 0;
        }

        .post {
            margin-bottom: 1.5rem;
        }

        .post-title {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .post-date {
            color: #666;
            font-size: 0.9rem;
        }

        a {
            color: #0057b8;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        hr {
            border: none;
            border-top: 1px solid #ddd;
            margin: 2rem 0;
        }
    </style>
</head>

<body>

<h1>Blog</h1>

<hr>

<ul class="post-list">

    <li class="post">
        <div class="post-title">
            <a href="shprg-stretch/">Achieving Polynomial Stretch for Seed-Homomorphic Pseudorandom Generators</a>
        </div>
        <div class="post-date">June 2026</div>
    </li>

</ul>

</body>
</html>
